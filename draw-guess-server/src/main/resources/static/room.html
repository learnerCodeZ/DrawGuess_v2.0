<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你画我猜 - 游戏房间</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .room-layout { display: flex; gap: 16px; flex-wrap: wrap; padding: 16px; max-width: 1400px; margin: 0 auto; }

        /* 画布区 */
        .canvas-area { flex: 1; min-width: 500px; }
        .canvas-area .card { padding: 16px; }
        .canvas-tools { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
        .canvas-tools button { padding: 6px 12px; border: 1px solid #d9d9d9; background: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .canvas-tools button:hover { border-color: #1890ff; color: #1890ff; }
        .canvas-tools button.active { background: #1890ff; color: #fff; border-color: #1890ff; }
        .canvas-tools input[type="color"] { width: 36px; height: 36px; border: none; cursor: pointer; padding: 0; }
        .canvas-wrapper { border: 2px solid #e8e8e8; border-radius: 8px; background: #fff; cursor: crosshair; position: relative; }
        .canvas-wrapper canvas { display: block; width: 100%; height: 400px; border-radius: 6px; }
        .canvas-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-size: 18px; color: #ccc; pointer-events: none;
        }
        .canvas-watermark.waiting { color: #1890ff; }

        /* 右侧面板 */
        .side-panel { width: 320px; }
        .side-panel .card { padding: 16px; }

        /* 游戏信息 */
        .game-info { text-align: center; margin-bottom: 16px; }
        .game-info .room-code { font-size: 24px; font-weight: 700; letter-spacing: 4px; color: #1890ff; }
        .game-info .timer { font-size: 36px; font-weight: 700; margin: 8px 0; }
        .game-info .timer.running { color: #52c41a; }
        .game-info .timer.urgent { color: #ff4d4f; animation: pulse 1s infinite; }
        .game-info .round-text { font-size: 14px; color: #666; }
        .game-info .word-hint { font-size: 20px; color: #1890ff; margin: 8px 0; letter-spacing: 4px; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 成员列表 */
        .member-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .member-item .role-badge { font-size: 12px; padding: 1px 6px; border-radius: 4px; margin-left: 8px; }
        .member-item .role-badge.painter { background: #fff7e6; color: #fa8c16; }
        .member-item .role-badge.creator { background: #e6f7ff; color: #1890ff; }
        .member-item .score-badge { margin-left: auto; font-weight: 600; color: #1890ff; }
        .member-item .answered-check { margin-left: 8px; color: #52c41a; }

        /* 答题区 */
        .answer-area { margin-top: 16px; }
        .answer-area .input-group { display: flex; gap: 8px; }
        .answer-area .input-group input { flex: 1; }
        .answer-area .answer-log { margin-top: 12px; }
        .answer-area .answer-log div { padding: 4px 0; font-size: 13px; color: #666; }
        .answer-area .answer-log .correct { color: #52c41a; font-weight: 600; }
        .answer-area .answer-log .wrong { color: #ff4d4f; }

        /* 消息日志 */
        .game-log { margin-top: 12px; max-height: 200px; overflow-y: auto; }
        .game-log div { padding: 4px 0; font-size: 13px; border-bottom: 1px solid #fafafa; }
        .game-log .log-highlight { color: #1890ff; font-weight: 500; }

        /* 终局结算 */
        .result-card { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .result-card .modal { color: #333; }
        .result-rank { padding: 8px 0; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; font-size: 15px; }
        .result-rank:first-child { font-size: 18px; font-weight: 700; }
        .result-rank .rank-medal { font-size: 24px; margin-right: 8px; }

        /* 响应式 */
        @media (max-width: 900px) {
            .room-layout { flex-direction: column; }
            .canvas-area { min-width: unset; }
            .side-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <nav class="navbar">
        <div class="navbar-brand">🎨 你画我猜</div>
        <div class="navbar-right">
            <span id="navbarUser"></span>
            <a href="/home.html" style="font-size:13px;">← 返回首页</a>
            <button class="btn btn-sm btn-danger" onclick="logout()">退出</button>
        </div>
    </nav>

    <div class="room-layout">
        <!-- 左侧画布 -->
        <div class="canvas-area">
            <div class="card">
                <!-- 游戏信息 -->
                <div class="game-info">
                    <div class="room-code" id="roomCodeDisplay">------</div>
                    <div class="round-text" id="roundDisplay"></div>
                    <div class="timer" id="timerDisplay">--</div>
                    <div class="word-hint" id="wordHintDisplay"></div>
                </div>

                <!-- 工具栏 -->
                <div class="canvas-tools" id="toolbar" style="display:none;">
                    <input type="color" id="colorPicker" value="#000000">
                    <button id="brushSize1" class="active" onclick="setBrushSize(2)">细</button>
                    <button onclick="setBrushSize(5)">中</button>
                    <button onclick="setBrushSize(10)">粗</button>
                    <button onclick="clearCanvas()">清空</button>
                    <button onclick="undoCanvas()">撤销</button>
                </div>

                <!-- 画布 -->
                <div class="canvas-wrapper">
                    <canvas id="gameCanvas"></canvas>
                    <div class="canvas-watermark" id="canvasWatermark">等待游戏开始...</div>
                </div>

                <!-- 答案日志 -->
                <div class="game-log" id="gameLog"></div>
            </div>
        </div>

        <!-- 右侧面板 -->
        <div class="side-panel">
            <div class="card">
                <h4 style="margin-bottom:12px;">👥 成员 <span id="memberCount"></span></h4>
                <div id="memberList"></div>

                <!-- 游戏控制 -->
                <div id="gameControls" style="margin-top:16px;display:none;">
                    <button id="startGameBtn" class="btn btn-primary btn-block" onclick="startGame()" style="display:none;">开始游戏</button>
                </div>
            </div>

            <!-- 答题区 -->
            <div class="card answer-area" id="answerArea" style="display:none;">
                <div class="input-group">
                    <input type="text" id="answerInput" class="form-input" placeholder="输入答案..." onkeydown="if(event.key==='Enter')submitAnswer()">
                    <button class="btn btn-sm btn-primary" onclick="submitAnswer()">发送</button>
                </div>
                <div class="answer-log" id="answerLog"><p style="color:#999;font-size:12px;">等待游戏开始...</p></div>
            </div>
        </div>
    </div>

    <!-- 游戏结果弹窗 -->
    <div id="resultModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header"><span>🏆 游戏结束</span></div>
            <div id="resultList"></div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="closeResult()">返回房间列表</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script>
        const roomId = new URLSearchParams(location.search).get('roomId');
        if (!roomId) window.location.href = '/home.html';

        let stompClient = null;
        let currentUser = api.getUser();
        let roomInfo = null;
        let isPainter = false;
        let gamePlaying = false;

        // ---- Canvas 系统 ----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let brushColor = '#000000';
        let brushSize = 2;
        let undoStack = [];

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 4;
            canvas.height = 400;
            canvas.style.width = '100%';
            canvas.style.height = '400px';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches?.[0]?.clientX || 0) - rect.left;
            const y = (e.clientY || e.touches?.[0]?.clientY || 0) - rect.top;
            return { x: x * (canvas.width / rect.width), y: y * (canvas.height / rect.height) };
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); draw(e); });
        canvas.addEventListener('touchend', stopDraw);

        function startDraw(e) {
            if (!isPainter || !gamePlaying) return;
            drawing = true;
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            saveState();
        }

        function draw(e) {
            if (!drawing || !isPainter || !gamePlaying) return;
            const pos = getPos(e);
            ctx.strokeStyle = brushColor;
            ctx.lineWidth = brushSize;
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);

            // 实时广播绘制数据
            if (stompClient && stompClient.connected) {
                stompClient.send('/app/draw', {}, JSON.stringify({
                    roomId: roomId,
                    data: { x: pos.x, y: pos.y, color: brushColor, size: brushSize, action: 'draw' }
                }));
            }
        }

        function stopDraw() {
            if (drawing && isPainter && stompClient?.connected) {
                stompClient.send('/app/draw', {}, JSON.stringify({
                    roomId: roomId,
                    data: { action: 'end' }
                }));
            }
            drawing = false;
        }

        function saveState() {
            undoStack.push(canvas.toDataURL());
            if (undoStack.length > 30) undoStack.shift();
        }

        function clearCanvas() {
            if (!isPainter) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            undoStack = [];
            broadcastDraw({ action: 'clear' });
        }

        function undoCanvas() {
            if (!isPainter || !undoStack.length) return;
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
            img.src = undoStack.pop();
            broadcastDraw({ action: 'undo' });
        }

        function setBrushSize(size) {
            if (!isPainter) return;
            brushSize = size;
            document.querySelectorAll('.canvas-tools button').forEach(b => {
                if (['细','中','粗'].includes(b.textContent)) b.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function broadcastDraw(data) {
            if (stompClient?.connected) {
                stompClient.send('/app/draw', {}, JSON.stringify({ roomId, data }));
            }
        }

        // ---- WebSocket ----
        function connectWebSocket() {
            const socket = new SockJS('/ws?token=' + api.getToken());
            stompClient = Stomp.over(socket);
            stompClient.reconnect_delay = 3000;

            stompClient.connect({}, frame => {
                console.log('WebSocket 已连接');

                // 订阅房间消息
                stompClient.subscribe('/topic/room/' + roomId, msg => {
                    const ws = JSON.parse(msg.body);
                    handleWsMessage(ws);
                });

                // 私信（画家的词语）
                stompClient.subscribe('/user/queue/word', msg => {
                    const ws = JSON.parse(msg.body);
                    if (ws.event === 'round_word') {
                        document.getElementById('wordHintDisplay').textContent = '你的词语: ' + ws.data.word;
                    }
                });

                // 加入房间
                stompClient.send('/app/join_room', {}, JSON.stringify({ roomId }));
            }, error => {
                console.error('WebSocket 连接失败', error);
                setTimeout(connectWebSocket, 5000);
            });
        }

        // ---- 消息处理 ----
        function handleWsMessage(ws) {
            const event = ws.event;
            const data = ws.data || {};

            switch (event) {
                case 'user_joined':
                    addLog(data.nickname + ' 加入了房间');
                    loadRoomInfo();
                    break;
                case 'user_left':
                    addLog(data.nickname + ' 离开了房间');
                    loadRoomInfo();
                    break;
                case 'room_state':
                    roomInfo = data;
                    renderMembers();
                    updateControls();
                    break;
                case 'room_dismissed':
                    addLog('⚠️ 房间已解散: ' + (data.reason || ''));
                    alert('房间已解散');
                    window.location.href = '/home.html';
                    break;
                case 'room_paused':
                    addLog('⏸️ 房间已被管理员暂停');
                    break;
                case 'room_resumed':
                    addLog('▶️ 房间已恢复');
                    break;
                case 'game_start':
                    gamePlaying = true;
                    document.getElementById('canvasWatermark').textContent = '游戏开始！';
                    document.getElementById('canvasWatermark').className = 'canvas-watermark';
                    showToolbar();
                    addLog('🎮 游戏开始！共 ' + data.totalRounds + ' 回合');
                    break;
                case 'round_start':
                    isPainter = (data.painterId === currentUser.id);
                    updateRoundInfo(data);
                    document.getElementById('answerLog').innerHTML = '';
                    addLog('🖌️ 第 ' + data.roundNumber + '/' + data.totalRounds + ' 回合 - ' + data.painterNickname + ' 作画');
                    if (!isPainter) {
                        document.getElementById('wordHintDisplay').textContent = '_'.repeat(data.wordLength);
                    }
                    document.getElementById('answerArea').style.display = isPainter ? 'none' : '';
                    toolVisibility();
                    break;
                case 'tick':
                    updateTimer(data.timeLeft);
                    break;
                case 'draw_data':
                    if (data.userId !== currentUser.id) {
                        // 收到其他人的绘制
                        receiveDraw(data.data);
                    }
                    break;
                case 'answer_correct':
                    addLog('✅ ' + data.nickname + ' 猜对了！答案是: ' + data.word);
                    loadRoomInfo();
                    break;
                case 'answer_result':
                    if (data.correct === false) {
                        addLog('❌ ' + data.nickname + ' 猜错了');
                    }
                    break;
                case 'round_end':
                    addLog('⏰ 回合结束！答案: ' + data.word);
                    gamePlaying = false;
                    isPainter = false;
                    toolVisibility();
                    break;
                case 'game_end':
                    gamePlaying = false;
                    isPainter = false;
                    toolVisibility();
                    showResult(data);
                    break;
            }
        }

        function receiveDraw(data) {
            if (!data) return;
            if (data.action === 'clear') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else if (data.action === 'undo') {
                // 撤销需要服务端存状态，暂简化
            } else if (data.action === 'end') {
                ctx.beginPath();
            } else if (data.action === 'draw') {
                ctx.strokeStyle = data.color;
                ctx.lineWidth = data.size;
                ctx.lineTo(data.x, data.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(data.x, data.y);
            }
        }

        // ---- UI 更新 ----
        async function loadRoomInfo() {
            try {
                roomInfo = await api.get('/api/rooms/' + roomId);
                renderMembers();
                updateControls();
                document.getElementById('roomCodeDisplay').textContent = roomInfo.roomId;
            } catch (e) {
                showToast('房间不存在', 'error');
                setTimeout(() => window.location.href = '/home.html', 1500);
            }
        }

        function renderMembers() {
            if (!roomInfo) return;
            const members = roomInfo.members || [];
            document.getElementById('memberCount').textContent = '(' + members.length + '/8)';

            document.getElementById('memberList').innerHTML = members.map(m => {
                const isCreator = m.userId === roomInfo.creatorId;
                const isCurrentPainter = isPainter && m.userId === roomInfo.members?.[0]?.userId;
                return `<div class="member-item">
                    <span class="online-dot online"></span>
                    <span>${m.nickname}</span>
                    ${isCreator ? '<span class="role-badge creator">房主</span>' : ''}
                    ${isCurrentPainter ? '<span class="role-badge painter">🎨</span>' : ''}
                    <span class="score-badge">${m.score}分</span>
                </div>`;
            }).join('');
        }

        function updateControls() {
            if (!roomInfo) return;
            const isCreator = roomInfo.creatorId === currentUser.id;
            const startBtn = document.getElementById('startGameBtn');
            startBtn.style.display = (isCreator && roomInfo.state === 'WAITING') ? '' : 'none';

            // 游戏中显示答题区
            if (roomInfo.state === 'PLAYING') {
                gamePlaying = true;
                document.getElementById('answerArea').style.display = isPainter ? 'none' : '';
            }
        }

        function updateRoundInfo(data) {
            document.getElementById('roundDisplay').textContent = '第 ' + data.roundNumber + '/' + data.totalRounds + ' 回合';
            if (isPainter) {
                document.getElementById('wordHintDisplay').textContent = '等待词语...';
            } else {
                document.getElementById('wordHintDisplay').textContent = '_'.repeat(data.wordLength || 0);
            }
        }

        function updateTimer(seconds) {
            const el = document.getElementById('timerDisplay');
            el.textContent = seconds + 's';
            el.className = 'timer' + (seconds <= 10 ? ' urgent' : ' running');
        }

        function toolVisibility() {
            document.getElementById('toolbar').style.display = isPainter && gamePlaying ? '' : 'none';
            if (!isPainter) {
                document.getElementById('wordHintDisplay').textContent = '';
            }
        }

        function showToolbar() {
            document.getElementById('toolbar').style.display = isPainter ? '' : 'none';
        }

        function addLog(msg) {
            const log = document.getElementById('gameLog');
            const div = document.createElement('div');
            div.textContent = msg;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        // ---- 游戏操作 ----
        function startGame() {
            if (stompClient?.connected) {
                stompClient.send('/app/start_game', {}, JSON.stringify({ roomId }));
            } else {
                api.post('/api/game/start', { roomId }).then(() => {}).catch(e => showToast(e.message, 'error'));
            }
        }

        function submitAnswer() {
            const input = document.getElementById('answerInput');
            const answer = input.value.trim();
            if (!answer || !stompClient?.connected) return;

            stompClient.send('/app/submit_answer', {}, JSON.stringify({ roomId, answer }));
            input.value = '';
            document.getElementById('answerLog').innerHTML += '<div class="wrong">你: ' + answer + '</div>';
        }

        // ---- 结果弹窗 ----
        function showResult(data) {
            const rankings = data.rankings || [];
            const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣', '6️⃣', '7️⃣', '8️⃣'];
            document.getElementById('resultList').innerHTML = rankings.map((p, i) =>
                `<div class="result-rank" style="${i === 0 ? 'font-size:20px;' : ''}">
                    <div><span class="rank-medal">${medals[i] || ''}</span> ${p.nickname}</div>
                    <div>${p.gameScore}分 <span style="font-size:12px;color:#999;">(总分${p.totalScore})</span></div>
                </div>`
            ).join('');
            document.getElementById('resultModal').classList.add('show');
        }

        function closeResult() {
            document.getElementById('resultModal').classList.remove('show');
            window.location.href = '/home.html';
        }

        function logout() {
            if (stompClient) stompClient.disconnect();
            api.clearAuth();
            window.location.href = '/index.html';
        }

        // ---- 页面初始化 ----
        document.addEventListener('DOMContentLoaded', () => {
            if (!api.isLoggedIn()) return window.location.href = '/index.html';
            document.getElementById('navbarUser').textContent = currentUser?.nickname || '';
            loadRoomInfo();
            connectWebSocket();
        });
    </script>
</body>
</html>
