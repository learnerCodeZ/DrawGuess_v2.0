<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你画我猜 - 登录</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
        }
        .auth-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #1890ff;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            text-align: center;
            font-size: 14px;
            color: #999;
            margin-bottom: 32px;
        }
        .auth-tabs {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 24px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-size: 15px;
            color: #999;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .auth-tab:hover { color: #1890ff; }
        .auth-tab.active { color: #1890ff; border-bottom-color: #1890ff; font-weight: 600; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .auth-tip {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-title">🎨 你画我猜</div>
            <div class="auth-subtitle">v2.0 — 和朋友一起玩</div>

            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">登录</div>
                <div class="auth-tab" onclick="switchTab('register')">注册</div>
            </div>

            <div id="alert" class="alert"></div>

            <!-- 登录表单 -->
            <div id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>手机号</label>
                    <input type="text" id="loginPhone" class="form-input" placeholder="请输入手机号" maxlength="11">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码" onkeydown="if(event.key==='Enter')login()">
                </div>
                <button class="btn btn-primary btn-block" onclick="login()">登 录</button>
                <div class="auth-tip">未注册？切换上方标签注册新账号</div>
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="regNickname" class="form-input" placeholder="1-20个字符" maxlength="20">
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="text" id="regPhone" class="form-input" placeholder="11位手机号" maxlength="11">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" class="form-input" placeholder="至少6位" onkeydown="if(event.key==='Enter')register()">
                </div>
                <button class="btn btn-primary btn-block" onclick="register()">注 册</button>
            </div>
        </div>
    </div>

    <!-- 强制改密弹窗 -->
    <div id="changePwdModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span>首次登录 - 请修改默认密码</span>
                <button class="modal-close" onclick="closeChangePwd()">&times;</button>
            </div>
            <div id="changePwdAlert" class="alert"></div>
            <div class="form-group">
                <label>新密码（至少6位）</label>
                <input type="password" id="newPassword" class="form-input" placeholder="请输入新密码">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="confirmPassword" class="form-input" placeholder="再次输入新密码" onkeydown="if(event.key==='Enter')forceChangePwd()">
            </div>
            <button class="btn btn-primary btn-block" onclick="forceChangePwd()">修改密码</button>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        let tempToken = null;
        let tempPhone = null;

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.auth-tab').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            hideAlert();
        }

        function showAlert(msg, type) {
            const el = document.getElementById('alert');
            el.textContent = msg;
            el.className = 'alert alert-' + type;
            el.style.display = 'block';
        }

        function hideAlert() {
            document.getElementById('alert').style.display = 'none';
        }

        async function login() {
            const phone = document.getElementById('loginPhone').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!phone || !password) {
                return showAlert('请填写手机号和密码', 'error');
            }
            if (!/^\d{11}$/.test(phone)) {
                return showAlert('手机号格式不正确', 'error');
            }

            hideAlert();

            try {
                const data = await api.post('/api/login', { phone, password });
                api.setToken(data.token);
                api.setUser(data.user);
                window.location.href = '/home.html';
            } catch (e) {
                // 检查超级管理员强制改密
                if (e.code === 1008 && e.data && e.data.tempToken) {
                    tempToken = e.data.tempToken;
                    tempPhone = phone;
                    document.getElementById('changePwdModal').classList.add('show');
                    return;
                }
                showAlert(e.message || '登录失败', 'error');
            }
        }

        async function register() {
            const nickname = document.getElementById('regNickname').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!nickname) return showAlert('请输入昵称', 'error');
            if (!phone || !/^\d{11}$/.test(phone)) return showAlert('请输入正确的手机号', 'error');
            if (!password || password.length < 6) return showAlert('密码至少6位', 'error');

            hideAlert();

            try {
                await api.post('/api/register', { nickname, phone, password });
                showAlert('注册成功，请等待管理员审核', 'success');
                switchTab('login');
            } catch (e) {
                showAlert(e.message || '注册失败', 'error');
            }
        }

        async function forceChangePwd() {
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;
            const alertEl = document.getElementById('changePwdAlert');

            if (!newPwd || newPwd.length < 6) {
                alertEl.textContent = '密码至少6位';
                alertEl.className = 'alert alert-error';
                alertEl.style.display = 'block';
                return;
            }
            if (newPwd !== confirmPwd) {
                alertEl.textContent = '两次密码不一致';
                alertEl.className = 'alert alert-error';
                alertEl.style.display = 'block';
                return;
            }

            alertEl.style.display = 'none';

            try {
                const data = await api.post('/api/change-password', {
                    tempToken: tempToken,
                    newPassword: newPwd
                });
                api.setToken(data.token);
                api.setUser(data.user);
                window.location.href = '/home.html';
            } catch (e) {
                alertEl.textContent = e.message || '修改失败';
                alertEl.className = 'alert alert-error';
                alertEl.style.display = 'block';
            }
        }

        function closeChangePwd() {
            document.getElementById('changePwdModal').classList.remove('show');
        }

        // 已登录则跳转首页
        if (api.isLoggedIn()) {
            window.location.href = '/home.html';
        }
    </script>
</body>
</html>
